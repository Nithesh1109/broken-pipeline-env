name: broken-pipeline-env
version: 1.0.0
entrypoint: inference.py
description: Synthetic data operations environment with three incident-response tasks.
tasks:
	- id: task1
		title: Data quality audit
		difficulty: easy
	- id: task2
		title: Schema drift remediation
		difficulty: medium
	- id: task3
		title: Full incident response
		difficulty: hard
api:
	base_path: /
	endpoints:
		- GET /health
		- GET /tasks
		- POST /reset/{task_id}
		- GET /scenario/{task_id}
		- GET /observe/{task_id}
		- POST /act/{task_id}
